<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#198754" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Zambia Memory Match</title>
  <style>
    :root {
      --bg: #f7f2d5;
      --panel: #fffdf4;
      --green: #198754;
      --dark-green: #0f5c38;
      --orange: #f28c28;
      --red: #d64045;
      --black: #1f1f1f;
      --gold: #f2c94c;
      --text: #213027;
      --muted: #5c6b61;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.10);
      font-family: Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0)),
        linear-gradient(135deg, #f7f2d5 0%, #dff2d8 50%, #fff3d6 100%);
      color: var(--text);
    }

    .app {
      width: min(100%, 560px);
      max-width: 100%;
      margin: 0 auto;
      padding: 16px 14px 24px;
    }

    .header {
      background: var(--panel);
      border-radius: 18px;
      padding: 18px 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1.9rem;
      line-height: 1.1;
      color: var(--dark-green);
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 0.98rem;
      color: var(--muted);
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin: 14px 0;
      padding: 12px 14px;
      background: var(--panel);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .status-info {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .moves {
      font-weight: 700;
      color: var(--black);
    }

    .timer {
      font-weight: 700;
      color: var(--black);
    }

    .restart-btn {
      border: 0;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .restart-btn:active {
      transform: scale(0.98);
    }

    .message {
      min-height: 24px;
      margin: 0 0 12px;
      padding: 0 8px;
      text-align: center;
      font-weight: 700;
      color: var(--red);
      overflow-wrap: anywhere;
      transition: transform 0.25s ease, color 0.25s ease;
    }

    .star-guide {
      margin: -2px 0 12px;
      padding: 0 8px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: 100%;
    }

    .card {
      aspect-ratio: 1 / 1;
      min-width: 0;
      border: 0;
      border-radius: 16px;
      padding: 8px;
      background: transparent;
      cursor: pointer;
      transition: transform 0.18s ease;
    }

    .card-face {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      font-weight: 700;
      line-height: 1.2;
      overflow: hidden;
      word-break: break-word;
      box-shadow: var(--shadow);
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease;
    }

    .card.is-hidden .card-face {
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.22), rgba(255,255,255,0) 34%),
        linear-gradient(135deg, #1f9d5c 0%, var(--green) 48%, var(--dark-green) 100%);
      color: #fff;
      font-size: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        0 10px 20px rgba(15, 92, 56, 0.22),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .card.is-hidden .card-face::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg,
          transparent 0%,
          transparent 71%,
          var(--orange) 71%,
          var(--orange) 79%,
          var(--black) 79%,
          var(--black) 87%,
          var(--red) 87%,
          var(--red) 95%,
          transparent 95%);
      opacity: 0.95;
      pointer-events: none;
    }

    .card.is-hidden .card-face::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.18) 0 2px, transparent 2px),
        radial-gradient(circle at 82% 24%, rgba(255,255,255,0.12) 0 2px, transparent 2px),
        radial-gradient(circle at 30% 82%, rgba(242, 201, 76, 0.22) 0 2px, transparent 2px),
        linear-gradient(135deg, transparent 0 42%, rgba(255,255,255,0.08) 42% 50%, transparent 50% 100%);
      pointer-events: none;
    }

    .card.is-revealed .card-face,
    .card.is-matched .card-face {
      background: var(--panel);
      color: var(--text);
      border: 2px solid rgba(25, 135, 84, 0.15);
      font-size: 0.95rem;
    }

    .card.is-matched .card-face {
      background:
        radial-gradient(circle at top, rgba(242, 201, 76, 0.34), rgba(242, 201, 76, 0) 38%),
        linear-gradient(180deg, #f7fff4 0%, #e7fff0 100%);
      border-color: var(--gold);
      box-shadow:
        0 12px 24px rgba(25, 135, 84, 0.16),
        0 0 0 2px rgba(242, 201, 76, 0.24);
      transform: translateY(-2px) scale(1.02);
    }

    .card.is-hidden:hover .card-face,
    .card.is-hidden:focus-visible .card-face {
      transform: translateY(-2px);
      box-shadow:
        0 14px 26px rgba(15, 92, 56, 0.26),
        inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .card.is-revealed .card-face {
      transform: scale(1.01);
    }

    .label {
      display: block;
    }

    .card-back-mark {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 100%;
    }

    .card-back-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 44px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card-back-text {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
    }

    .message.is-win {
      min-height: auto;
      padding: 12px 14px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(25, 135, 84, 0.12), rgba(242, 201, 76, 0.28));
      color: var(--dark-green);
      box-shadow: var(--shadow);
      transform: scale(1.02);
      animation: win-pop 0.55s ease;
    }

    .stars {
      display: block;
      margin-top: 6px;
      font-size: 1.45rem;
      letter-spacing: 0.08em;
      color: var(--orange);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    @keyframes win-pop {
      0% {
        opacity: 0;
        transform: translateY(6px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1.02);
      }
    }

    @media (max-width: 420px) {
      .app {
        padding: 12px 10px 20px;
      }

      .header {
        padding: 16px 12px;
      }

      h1 {
        font-size: 1.65rem;
      }

      .subtitle {
        font-size: 0.92rem;
      }

      .status-bar {
        justify-content: center;
        padding: 10px 12px;
      }

      .status-info {
        width: 100%;
        justify-content: space-between;
        gap: 10px;
      }

      .board {
        gap: 8px;
      }

      .card {
        padding: 6px;
      }

      .card.is-revealed .card-face,
      .card.is-matched .card-face {
        font-size: 0.86rem;
      }

      .card-back-badge {
        min-width: 40px;
        height: 40px;
        font-size: 0.92rem;
      }

      .card-back-text {
        font-size: 0.64rem;
      }
    }

    @media (max-width: 360px) {
      .app {
        padding: 10px 8px 18px;
      }

      h1 {
        font-size: 1.45rem;
      }

      .subtitle,
      .moves,
      .timer,
      .restart-btn {
        font-size: 0.88rem;
      }

      .status-info {
        justify-content: center;
      }

      .restart-btn {
        width: 100%;
      }

      .board {
        gap: 6px;
      }

      .card {
        padding: 4px;
      }

      .card-face {
        padding: 6px;
      }

      .card.is-revealed .card-face,
      .card.is-matched .card-face {
        font-size: 0.78rem;
      }

      .card-back-badge {
        min-width: 34px;
        height: 34px;
        font-size: 0.82rem;
      }

      .card-back-text {
        font-size: 0.58rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>Zambia Memory Match</h1>
      <p class="subtitle">Tap two cards to find all 8 Zambia-themed matching pairs.</p>
    </section>

    <section class="status-bar" aria-label="Game status">
      <div class="status-info">
        <div class="moves">Moves: <span id="moves">0</span></div>
        <div class="timer">Time: <span id="timer">0s</span></div>
      </div>
      <button class="restart-btn" id="restartBtn" type="button">Restart</button>
    </section>

    <p class="message" id="message" aria-live="polite"></p>
    <p class="star-guide">Star guide: 3★ under 20s • 2★ under 35s • 1★ after that</p>

    <section class="board" id="board" aria-label="Memory match game board"></section>
  </main>

  <script>
    const pairs = [
      { name: "Zambia Flag", icon: "🇿🇲" },
      { name: "Fish Eagle", icon: "🦅" },
      { name: "Victoria Falls", icon: "💧" },
      { name: "Nshima", icon: "🍽️" },
      { name: "Chitenge", icon: "🧵" },
      { name: "Elephant", icon: "🐘" },
      { name: "Baobab", icon: "🌳" },
      { name: "Lusaka", icon: "🏙️" }
    ];

    const board = document.getElementById("board");
    const movesEl = document.getElementById("moves");
    const timerEl = document.getElementById("timer");
    const messageEl = document.getElementById("message");
    const restartBtn = document.getElementById("restartBtn");

    let deck = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;
    let matchedPairs = 0;
    let elapsedSeconds = 0;
    let timerId = null;
    let timerStarted = false;

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function createDeck() {
      const cards = [];
      pairs.forEach((pair) => {
        cards.push({ id: pair.name + "-a", pairId: pair.name, text: pair.icon + " " + pair.name });
        cards.push({ id: pair.name + "-b", pairId: pair.name, text: pair.icon + " " + pair.name });
      });
      return shuffle(cards);
    }

    function updateMoves() {
      movesEl.textContent = String(moves);
    }

    function updateTimer() {
      timerEl.textContent = elapsedSeconds + "s";
    }

    function startTimer() {
      if (timerStarted) {
        return;
      }

      timerStarted = true;
      timerId = window.setInterval(() => {
        elapsedSeconds += 1;
        updateTimer();
      }, 1000);
    }

    function stopTimer() {
      if (timerId) {
        window.clearInterval(timerId);
        timerId = null;
      }
    }

    function getStarCount() {
      if (elapsedSeconds <= 20) {
        return 3;
      }

      if (elapsedSeconds <= 35) {
        return 2;
      }

      return 1;
    }

    function getStarsDisplay() {
      return "★".repeat(getStarCount()) + "☆".repeat(3 - getStarCount());
    }

    function showMessage(text) {
      messageEl.innerHTML = text;
      messageEl.classList.toggle("is-win", text.length > 0);
    }

    function renderBoard() {
      board.innerHTML = "";

      deck.forEach((cardData, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "card is-hidden";
        button.dataset.index = String(index);
        button.setAttribute("aria-label", "Hidden card");

        const face = document.createElement("span");
        face.className = "card-face";
        face.innerHTML = '<span class="card-back-mark"><span class="card-back-badge">ZM</span><span class="card-back-text">Match</span></span>';

        button.appendChild(face);
        button.addEventListener("click", onCardClick);
        board.appendChild(button);
      });
    }

    function revealCard(button, cardData) {
      button.className = "card is-revealed";
      button.querySelector(".card-face").innerHTML = '<span class="label">' + cardData.text + "</span>";
      button.setAttribute("aria-label", cardData.text);
    }

    function hideCard(button) {
      button.className = "card is-hidden";
      button.querySelector(".card-face").innerHTML = '<span class="card-back-mark"><span class="card-back-badge">ZM</span><span class="card-back-text">Match</span></span>';
      button.setAttribute("aria-label", "Hidden card");
    }

    function matchCard(button) {
      button.className = "card is-matched";
      button.disabled = true;
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function finishGame() {
      stopTimer();
      showMessage("Wamona! Wapisha all 8 pairs in " + elapsedSeconds + "s. Zambia shine!<span class=\"stars\">" + getStarsDisplay() + "</span>");
    }

    function onCardClick(event) {
      const button = event.currentTarget;
      const index = Number(button.dataset.index);
      const cardData = deck[index];

      if (lockBoard || button === firstCard || button.classList.contains("is-matched")) {
        return;
      }

      startTimer();
      revealCard(button, cardData);

      if (!firstCard) {
        firstCard = button;
        return;
      }

      secondCard = button;
      lockBoard = true;
      moves += 1;
      updateMoves();

      const firstData = deck[Number(firstCard.dataset.index)];
      const secondData = deck[Number(secondCard.dataset.index)];

      if (firstData.pairId === secondData.pairId) {
        matchCard(firstCard);
        matchCard(secondCard);
        matchedPairs += 1;
        resetTurn();

        if (matchedPairs === pairs.length) {
          finishGame();
        }
        return;
      }

      window.setTimeout(() => {
        hideCard(firstCard);
        hideCard(secondCard);
        resetTurn();
      }, 700);
    }

    function startGame() {
      stopTimer();
      deck = createDeck();
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;
      matchedPairs = 0;
      elapsedSeconds = 0;
      timerStarted = false;
      updateMoves();
      updateTimer();
      showMessage("");
      renderBoard();
    }

    restartBtn.addEventListener("click", startGame);
    startGame();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
